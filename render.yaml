services:
  - type: static
    name: data-parse-website
    env: static
    buildCommand: ""
    publishDir: "."
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /index
        destination: /index.html
      - type: rewrite
        source: /about
        destination: /about.html
      - type: rewrite
        source: /work
        destination: /work.html
      - type: rewrite
        source: /schedule
        destination: /schedule.html
      - type: rewrite
        source: /services
        destination: /services.html
      - type: rewrite
        source: /blog
        destination: /blog.html
      - type: rewrite
        source: /join
        destination: /join.html
